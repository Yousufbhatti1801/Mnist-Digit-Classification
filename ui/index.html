<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MNIST Digit Classifier</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --panel-2: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --accent-2: #818cf8;
    --good: #34d399;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont,
    "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg);
    color: var(--text); display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px;
  }
  h1 { font-size: 1.6rem; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 28px; font-size: .92rem; }
  .app {
    display: flex; gap: 28px; flex-wrap: wrap; justify-content: center;
    width: 100%; max-width: 760px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--panel-2);
    border-radius: 16px; padding: 22px; box-shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  .draw-card { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  #pad {
    background: #000; border-radius: 12px; cursor: crosshair; touch-action: none;
    border: 2px solid var(--panel-2);
  }
  .btn-row { display: flex; gap: 10px; }
  button {
    font-size: .92rem; font-weight: 600; border: none; border-radius: 10px;
    padding: 10px 18px; cursor: pointer; color: #0b1220; transition: transform .05s;
  }
  button:active { transform: translateY(1px); }
  .predict { background: var(--accent); }
  .clear { background: var(--panel-2); color: var(--text); }
  .result-card { flex: 1; min-width: 280px; display: flex; flex-direction: column; }
  .big-digit {
    font-size: 5.5rem; font-weight: 800; line-height: 1; text-align: center;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    min-height: 88px;
  }
  .conf { text-align: center; color: var(--muted); margin: 2px 0 18px; min-height: 1.2em; }
  .bars { display: flex; flex-direction: column; gap: 7px; }
  .bar-row { display: flex; align-items: center; gap: 10px; font-variant-numeric: tabular-nums; }
  .bar-row .lbl { width: 14px; text-align: center; color: var(--muted); font-weight: 600; }
  .bar-track { flex: 1; background: var(--panel-2); border-radius: 6px; height: 16px; overflow: hidden; }
  .bar-fill {
    height: 100%; width: 0; border-radius: 6px;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    transition: width .35s ease;
  }
  .bar-row.win .bar-fill { background: linear-gradient(90deg, var(--good), var(--accent)); }
  .bar-row .pct { width: 44px; text-align: right; color: var(--muted); font-size: .8rem; }
  .hint { color: var(--muted); font-size: .8rem; text-align: center; margin-top: 4px; }
  .err { color: #fca5a5; font-size: .85rem; text-align: center; min-height: 1em; }
  a { color: var(--accent); }
</style>
</head>
<body>
  <h1>MNIST Digit Classifier</h1>
  <p class="sub">Draw a digit (0–9) and the ANN will guess it. &nbsp;·&nbsp; <a href="/docs">API docs</a></p>

  <div class="app">
    <div class="card draw-card">
      <canvas id="pad" width="280" height="280"></canvas>
      <div class="btn-row">
        <button class="clear" id="clear">Clear</button>
        <button class="predict" id="predict">Predict</button>
      </div>
      <div class="hint">Tip: draw a single clear digit anywhere — it's auto-centered before prediction.</div>
    </div>

    <div class="card result-card">
      <div class="big-digit" id="digit">–</div>
      <div class="conf" id="conf"></div>
      <div class="bars" id="bars"></div>
      <div class="err" id="err"></div>
    </div>
  </div>

<script>
(function () {
  const canvas = document.getElementById("pad");
  const ctx = canvas.getContext("2d");
  const SIZE = canvas.width;            // 280
  const GRID = 28;                       // model input side

  // --- drawing surface -----------------------------------------------------
  function resetCanvas() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, SIZE, SIZE);
    ctx.lineWidth = 22;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#fff";
  }
  resetCanvas();

  let drawing = false, last = null;
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: (p.clientX - r.left) * (SIZE / r.width),
             y: (p.clientY - r.top) * (SIZE / r.height) };
  }
  function start(e) { drawing = true; last = pos(e); e.preventDefault(); }
  function move(e) {
    if (!drawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    last = p; e.preventDefault();
  }
  function end() { drawing = false; }

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);

  // --- downsample 280x280 -> 28x28 grayscale -------------------------------
  function to28x28() {
    const tmp = document.createElement("canvas");
    tmp.width = GRID; tmp.height = GRID;
    const tctx = tmp.getContext("2d");
    tctx.drawImage(canvas, 0, 0, GRID, GRID);
    const data = tctx.getImageData(0, 0, GRID, GRID).data;
    const pixels = new Array(GRID * GRID);
    for (let i = 0; i < GRID * GRID; i++) pixels[i] = data[i * 4] / 255; // R channel, already grayscale
    return pixels;
  }

  // --- probability bars ----------------------------------------------------
  const bars = document.getElementById("bars");
  function buildBars() {
    for (let d = 0; d < 10; d++) {
      const row = document.createElement("div");
      row.className = "bar-row"; row.dataset.d = d;
      row.innerHTML = `<span class="lbl">${d}</span>
        <span class="bar-track"><span class="bar-fill"></span></span>
        <span class="pct">0%</span>`;
      bars.appendChild(row);
    }
  }
  buildBars();

  function render(result) {
    document.getElementById("digit").textContent = result.digit;
    document.getElementById("conf").textContent =
      `confidence ${(result.confidence * 100).toFixed(1)}%`;
    const rows = bars.querySelectorAll(".bar-row");
    result.probabilities.forEach((p, d) => {
      const row = rows[d];
      row.querySelector(".bar-fill").style.width = (p * 100).toFixed(1) + "%";
      row.querySelector(".pct").textContent = (p * 100).toFixed(0) + "%";
      row.classList.toggle("win", d === result.digit);
    });
  }

  // --- predict -------------------------------------------------------------
  const errEl = document.getElementById("err");
  async function predict() {
    errEl.textContent = "";
    try {
      const res = await fetch("/predict/canvas", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pixels: to28x28(), auto_orient: false }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || `HTTP ${res.status}`);
      }
      render(await res.json());
    } catch (e) {
      errEl.textContent = "Prediction failed: " + e.message;
    }
  }

  function clearAll() {
    resetCanvas();
    document.getElementById("digit").textContent = "–";
    document.getElementById("conf").textContent = "";
    errEl.textContent = "";
    bars.querySelectorAll(".bar-row").forEach((row) => {
      row.querySelector(".bar-fill").style.width = "0";
      row.querySelector(".pct").textContent = "0%";
      row.classList.remove("win");
    });
  }

  document.getElementById("predict").addEventListener("click", predict);
  document.getElementById("clear").addEventListener("click", clearAll);
})();
</script>
</body>
</html>
